<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teya LP — Offer Variants</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #17191a;
      font-family: 'Figtree', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── shell ─── */
    .shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding-top: 28px;
      gap: 20px;
    }

    /* ─── controls ─── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 390px;
      max-width: calc(100vw - 32px);
      flex-shrink: 0;
      transition: width 0.4s cubic-bezier(.16,1,.3,1);
    }

    .controls-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ─── switcher pill (reusable) ─── */
    .switcher {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 100px;
      padding: 3px;
      gap: 1px;
    }

    .sw-track {
      position: absolute;
      top: 3px; bottom: 3px; left: 3px;
      border-radius: 100px;
      background: #E1E51A;
      pointer-events: none;
      transition: left 0.3s cubic-bezier(.16,1,.3,1),
                  width 0.3s cubic-bezier(.16,1,.3,1);
      will-change: left, width;
    }

    .sw-btn {
      position: relative;
      z-index: 1;
      padding: 6px 14px;
      border: none;
      border-radius: 100px;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      cursor: pointer;
      transition: color 0.2s ease;
      outline: none;
      white-space: nowrap;
      line-height: 1.4;
    }
    .sw-btn.active { color: #1a1a00; }
    .sw-btn.icon-btn { padding: 7px 11px; display: flex; align-items: center; }
    .sw-btn svg { display: block; }

    /* ─── device stage ─── */
    .device-stage {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      overflow: hidden;
      padding-bottom: 20px;
    }

    #device-area {
      flex-shrink: 0;
      transition: opacity 0.22s ease;
      transform-origin: top center;
    }

    /* ═══ MOBILE MODE ═══ */
    #device-area.is-mobile {
      position: relative;
      width: 390px; height: 852px;
      border-radius: 54px;
      overflow: hidden;
      background: #0a0a0a;
      /* outer chassis ring */
      box-shadow:
        0 0 0 10px #1f2020,
        0 0 0 11px rgba(255,255,255,0.08),
        0 0 0 12px rgba(0,0,0,0.5),
        0 32px 72px -8px rgba(0,0,0,0.75),
        0 8px 24px -4px rgba(0,0,0,0.5);
    }

    /* dynamic island */
    #device-area.is-mobile .notch {
      display: block;
      position: absolute;
      top: 13px;
      left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #0a0a0a;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }
    #device-area.is-desktop .notch { display: none; }

    /* home bar */
    #device-area.is-mobile .home-bar {
      display: flex;
      position: absolute;
      bottom: 8px;
      left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(255,255,255,0.28);
      border-radius: 100px;
      z-index: 20;
      pointer-events: none;
    }
    #device-area.is-desktop .home-bar { display: none; }

    /* mobile viewport */
    #device-area.is-mobile #vp {
      position: absolute; inset: 0;
    }

    #device-area.is-mobile #vp iframe {
      position: absolute; inset: 0;
      width: 390px; height: 852px;
      border: none;
    }

    /* mobile hides browser chrome */
    #device-area.is-mobile .browser-chrome { display: none; }

    /* ═══ DESKTOP MODE ═══ */
    #device-area.is-desktop {
      display: flex;
      flex-direction: column;
      width: 960px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 32px 72px -8px rgba(0,0,0,0.8),
        0 8px 24px -4px rgba(0,0,0,0.5);
    }

    .browser-chrome {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      height: 44px;
      background: #252627;
      padding: 0 14px;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.4);
    }

    .br-dots {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }

    .br-spacer { flex: 1; }

    .br-url {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      height: 28px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.01em;
      flex: 0 1 340px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #device-area.is-desktop #vp {
      position: relative;
      width: 960px;
      height: 900px;
      overflow: hidden;
      flex-shrink: 0;
    }

    #device-area.is-desktop #vp iframe {
      position: absolute;
      top: 0; left: 0;
      width: 960px; height: 900px;
      border: none;
    }

    /* shared iframe visibility */
    #vp iframe { transition: opacity 0.2s ease; }
    #vp iframe.v-hidden { opacity: 0; pointer-events: none; }

    /* ─── hint ─── */
    .hint {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── controls ── -->
  <div class="controls" id="controls">
    <span class="controls-label">Teya LP</span>

    <div class="controls-right">

      <!-- device switcher -->
      <div class="switcher" id="device-sw">
        <div class="sw-track" id="device-track"></div>

        <!-- phone icon -->
        <button class="sw-btn icon-btn active" id="dev-m" onclick="setDevice('m')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="4.5" y="1.5" width="7" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <line x1="6.5" y1="12.5" x2="9.5" y2="12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- monitor icon -->
        <button class="sw-btn icon-btn" id="dev-d" onclick="setDevice('d')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="2.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5.5 13.5H10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="8" y1="11.5" x2="8" y2="13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- variant switcher -->
      <div class="switcher" id="variant-sw">
        <div class="sw-track" id="variant-track"></div>
        <button class="sw-btn active" id="var-1" onclick="setVariant(1)">Option 1</button>
        <button class="sw-btn"        id="var-2" onclick="setVariant(2)">Option 2</button>
      </div>

    </div>
  </div>

  <!-- ── device stage ── -->
  <div class="device-stage">
    <div id="device-area" class="is-mobile">

      <!-- decorative overlays (mobile) -->
      <div class="notch"></div>
      <div class="home-bar"></div>

      <!-- browser chrome (desktop) -->
      <div class="browser-chrome">
        <div class="br-dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>
        <div class="br-spacer"></div>
        <div class="br-url">teya.com/offer/preview</div>
        <div class="br-spacer"></div>
      </div>

      <!-- viewport -->
      <div id="vp">
        <iframe id="f1" src="./Op1/index.html" title="Option 1"></iframe>
        <iframe id="f2" src="./Op2/index.html" title="Option 2" class="v-hidden"></iframe>
      </div>

    </div>
  </div>

  <span class="hint">Switch device or variant above</span>

</div>

<script>
  let device  = 'm'; // 'm' | 'd'
  let variant = 1;   // 1 | 2

  /* ── track position ── */
  function moveTrack(swId, trackId, activeBtn) {
    const sw    = document.getElementById(swId);
    const track = document.getElementById(trackId);
    const btn   = typeof activeBtn === 'string'
      ? document.getElementById(activeBtn)
      : activeBtn;
    const swR  = sw.getBoundingClientRect();
    const btnR = btn.getBoundingClientRect();
    track.style.left  = (btnR.left - swR.left - 3) + 'px';
    track.style.width = btnR.width + 'px';
  }

  /* ── variant switch ── */
  function setVariant(v) {
    if (v === variant) return;
    variant = v;
    document.getElementById('f1').classList.toggle('v-hidden', v !== 1);
    document.getElementById('f2').classList.toggle('v-hidden', v !== 2);
    document.getElementById('var-1').classList.toggle('active', v === 1);
    document.getElementById('var-2').classList.toggle('active', v === 2);
    moveTrack('variant-sw', 'variant-track', v === 1 ? 'var-1' : 'var-2');
  }

  /* ── device switch ── */
  function setDevice(d) {
    if (d === device) return;

    const area = document.getElementById('device-area');

    // fade out
    area.style.opacity = '0';

    setTimeout(() => {
      device = d;
      applyDeviceDOM(d);
      applyScale();

      // update device switcher
      document.getElementById('dev-m').classList.toggle('active', d === 'm');
      document.getElementById('dev-d').classList.toggle('active', d === 'd');
      moveTrack('device-sw', 'device-track', d === 'm' ? 'dev-m' : 'dev-d');

      // update controls width
      syncControlsWidth(d);

      // fade in
      area.style.opacity = '1';
    }, 220);
  }

  function applyDeviceDOM(d) {
    const area = document.getElementById('device-area');
    area.classList.toggle('is-mobile', d === 'm');
    area.classList.toggle('is-desktop', d === 'd');
  }

  /* ── responsive scale ── */
  function applyScale() {
    const area   = document.getElementById('device-area');
    const availW = window.innerWidth  - 32;
    const availH = window.innerHeight - 140; // controls + gaps + hint

    const natW = device === 'm' ? 390  : 960;
    const natH = device === 'm' ? 852  : 944; // 900vp + 44chrome

    const s = Math.min(1, availW / natW, availH / natH);
    area.style.transform = `scale(${s})`;
    area.style.transformOrigin = 'top center';
    // collapse dead space created by transform
    area.style.marginBottom = `-${natH * (1 - s)}px`;
  }

  function syncControlsWidth(d) {
    const controls = document.getElementById('controls');
    const natW = d === 'm' ? 390 : 960;
    const availW = window.innerWidth - 32;
    const s = Math.min(1, availW / natW, (window.innerHeight - 140) / (d === 'm' ? 852 : 944));
    controls.style.width = Math.round(natW * s) + 'px';
  }

  /* ── init ── */
  window.addEventListener('load', () => {
    applyDeviceDOM('m');
    applyScale();
    syncControlsWidth('m');
    // tracks need a frame to measure button rects
    requestAnimationFrame(() => {
      moveTrack('device-sw',  'device-track',  'dev-m');
      moveTrack('variant-sw', 'variant-track', 'var-1');
    });
  });

  window.addEventListener('resize', () => {
    applyScale();
    syncControlsWidth(device);
    requestAnimationFrame(() => {
      moveTrack('device-sw',  'device-track',  device  === 'm' ? 'dev-m' : 'dev-d');
      moveTrack('variant-sw', 'variant-track', variant === 1   ? 'var-1' : 'var-2');
    });
  });
</script>

</body>
</html>
